<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Заявки</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 1200px; margin: 0 auto; }
    h1 { margin-bottom: 8px; color: #a51312; }
    nav { margin-bottom: 24px; font-size: 14px; }
    nav a { color: #a51312; margin-right: 16px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
    th { background: #a51312; color: #fff; white-space: nowrap; }
    .btn-del { background: #dc3545; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .btn-del:hover { background: #b02a37; }
    .btn-status { background: #6c757d; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; margin-right: 4px; }
    .btn-status:hover { background: #565e64; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
    .badge-new { background: #d4edda; color: #155724; }
    .badge-processed { background: #e2e3e5; color: #6c757d; }
    .empty { text-align: center; padding: 40px; color: #888; font-size: 16px; }
    .actions { white-space: nowrap; }
  </style>
</head>
<body>

<h1>Заявки</h1>
<nav>
  <a href="/admin/teachers.html">Педагоги</a>
  <a href="/admin/news.html">Новости</a>
  <a href="/admin/collectives.html">Коллективы</a>
  <a href="/admin/applications.html">Заявки</a>
  <a href="/admin/pages.html">Страницы</a>
</nav>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Дата</th>
      <th>Имя родителя</th>
      <th>Телефон</th>
      <th>Имя ребёнка</th>
      <th>Возраст</th>
      <th>Коллектив</th>
      <th>Сообщение</th>
      <th>Статус</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const API = "http://localhost:3001";

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "Z");
  return d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
}

async function load() {
  const res = await fetch(API + "/api/admin/applications");
  const data = await res.json();
  const tbody = document.getElementById("tbody");

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">Заявок пока нет</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(a => `
    <tr>
      <td>${a.id}</td>
      <td>${esc(formatDate(a.created_at))}</td>
      <td>${esc(a.parent_name)}</td>
      <td>${esc(a.phone)}</td>
      <td>${esc(a.child_name || "—")}</td>
      <td>${esc(a.child_age || "—")}</td>
      <td>${esc(a.collective_name || "—")}</td>
      <td>${esc(a.message || "—")}</td>
      <td>${a.status === "new"
        ? '<span class="badge badge-new">Новая</span>'
        : '<span class="badge badge-processed">Обработана</span>'}</td>
      <td class="actions">
        ${a.status === "new"
          ? `<button class="btn-status" onclick="setStatus(${a.id}, 'processed')">Обработана</button>`
          : `<button class="btn-status" onclick="setStatus(${a.id}, 'new')">Новая</button>`}
        <button class="btn-del" onclick="del(${a.id})">Удалить</button>
      </td>
    </tr>
  `).join("");
}

async function setStatus(id, status) {
  await fetch(API + "/api/admin/applications/" + id + "/status", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status }),
  });
  load();
}

async function del(id) {
  if (!confirm("Удалить заявку?")) return;
  await fetch(API + "/api/admin/applications/" + id, { method: "DELETE" });
  load();
}

load();
</script>

</body>
</html>
