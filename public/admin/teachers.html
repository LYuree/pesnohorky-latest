<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Педагоги</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 900px; margin: 0 auto; }
    h1 { margin-bottom: 8px; color: #a51312; }
    nav { margin-bottom: 24px; font-size: 14px; }
    nav a { color: #a51312; margin-right: 16px; }
    .form-card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 32px; }
    .form-card h2 { margin-bottom: 16px; font-size: 18px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 14px; }
    input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 12px; }
    textarea { min-height: 100px; resize: vertical; }
    button[type="submit"] { background: #a51312; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button[type="submit"]:hover { background: #8a0f0e; }
    .msg { padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; display: none; }
    .msg.ok { display: block; background: #d4edda; color: #155724; }
    .msg.err { display: block; background: #f8d7da; color: #721c24; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    th { background: #a51312; color: #fff; }
    .btn-del { background: #dc3545; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .btn-del:hover { background: #b02a37; }
    .photo-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 50%; }
  </style>
</head>
<body>

<h1>Педагоги</h1>
<nav>
  <a href="/admin/teachers.html">Педагоги</a>
  <a href="/admin/news.html">Новости</a>
</nav>

<div class="form-card">
  <h2>Добавить педагога</h2>
  <div id="msg" class="msg"></div>
  <form id="form">
    <label for="name">Имя *</label>
    <input id="name" name="name" required placeholder="Иванов Иван Иванович">

    <label for="bio">Биография *</label>
    <textarea id="bio" name="bio" required placeholder="Педагог дополнительного образования..."></textarea>

    <label for="photo_url">URL фото</label>
    <input id="photo_url" name="photo_url" placeholder="https://example.com/photo.jpg">

    <button type="submit">Создать</button>
  </form>
</div>

<h2 style="margin-bottom:12px">Список педагогов</h2>
<table>
  <thead><tr><th></th><th>ID</th><th>Имя</th><th>Дата создания</th><th></th></tr></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const API = "http://localhost:3001";

async function load() {
  const res = await fetch(API + "/api/teachers");
  const data = await res.json();
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = data.map(t => `
    <tr>
      <td>${t.photo_url ? `<img class="photo-thumb" src="${esc(t.photo_url)}" alt="">` : "—"}</td>
      <td>${t.id}</td>
      <td>${esc(t.name)}</td>
      <td>${t.created_at || ""}</td>
      <td><button class="btn-del" onclick="del(${t.id})">Удалить</button></td>
    </tr>
  `).join("");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function del(id) {
  if (!confirm("Удалить педагога?")) return;
  await fetch(API + "/api/admin/teachers/" + id, { method: "DELETE" });
  load();
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const msg = document.getElementById("msg");
  const body = {
    name: document.getElementById("name").value.trim(),
    bio: document.getElementById("bio").value.trim(),
    photo_url: document.getElementById("photo_url").value.trim() || undefined,
  };
  try {
    const res = await fetch(API + "/api/admin/teachers", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
    msg.className = "msg ok";
    msg.textContent = "Педагог добавлен!";
    document.getElementById("form").reset();
    load();
  } catch (err) {
    msg.className = "msg err";
    msg.textContent = "Ошибка: " + err.message;
  }
});

load();
</script>

</body>
</html>
