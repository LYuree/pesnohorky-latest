<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Новости</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 900px; margin: 0 auto; }
    h1 { margin-bottom: 8px; color: #a51312; }
    nav { margin-bottom: 24px; font-size: 14px; }
    nav a { color: #a51312; margin-right: 16px; }
    .form-card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 32px; }
    .form-card h2 { margin-bottom: 16px; font-size: 18px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 14px; }
    input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 12px; }
    textarea { min-height: 120px; resize: vertical; }
    button[type="submit"] { background: #a51312; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button[type="submit"]:hover { background: #8a0f0e; }
    .msg { padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; display: none; }
    .msg.ok { display: block; background: #d4edda; color: #155724; }
    .msg.err { display: block; background: #f8d7da; color: #721c24; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    th { background: #a51312; color: #fff; }
    .btn-del { background: #dc3545; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .btn-del:hover { background: #b02a37; }
    .preview { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>

<h1>Новости</h1>
<nav>
  <a href="/admin/teachers.html">Педагоги</a>
  <a href="/admin/news.html">Новости</a>
</nav>

<div class="form-card">
  <h2>Добавить новость</h2>
  <div id="msg" class="msg"></div>
  <form id="form">
    <label for="title">Заголовок *</label>
    <input id="title" name="title" required placeholder="Весенний калейдоскоп">

    <label for="content">Содержание *</label>
    <textarea id="content" name="content" required placeholder="Текст новости..."></textarea>

    <label for="date">Дата *</label>
    <input id="date" name="date" type="date" required>

    <label for="image_url">URL изображения</label>
    <input id="image_url" name="image_url" placeholder="https://example.com/image.jpg">

    <button type="submit">Создать</button>
  </form>
</div>

<h2 style="margin-bottom:12px">Список новостей</h2>
<table>
  <thead><tr><th>ID</th><th>Заголовок</th><th>Дата</th><th>Превью</th><th></th></tr></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const API = "http://localhost:3001";

async function load() {
  const res = await fetch(API + "/api/news");
  const data = await res.json();
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = data.map(n => `
    <tr>
      <td>${n.id}</td>
      <td>${esc(n.title)}</td>
      <td>${esc(n.date)}</td>
      <td class="preview">${esc(n.preview || "")}</td>
      <td><button class="btn-del" onclick="del(${n.id})">Удалить</button></td>
    </tr>
  `).join("");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function del(id) {
  if (!confirm("Удалить новость?")) return;
  await fetch(API + "/api/admin/news/" + id, { method: "DELETE" });
  load();
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const msg = document.getElementById("msg");
  const body = {
    title: document.getElementById("title").value.trim(),
    content: document.getElementById("content").value.trim(),
    date: document.getElementById("date").value,
    image_url: document.getElementById("image_url").value.trim() || undefined,
  };
  try {
    const res = await fetch(API + "/api/admin/news", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
    msg.className = "msg ok";
    msg.textContent = "Новость добавлена!";
    document.getElementById("form").reset();
    load();
  } catch (err) {
    msg.className = "msg err";
    msg.textContent = "Ошибка: " + err.message;
  }
});

load();
</script>

</body>
</html>
