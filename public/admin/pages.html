<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Страницы</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 20px; max-width: 1100px; margin: 0 auto; }
    h1 { margin-bottom: 8px; color: #a51312; }
    nav { margin-bottom: 24px; font-size: 14px; }
    nav a { color: #a51312; margin-right: 16px; }
    .form-card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 32px; }
    .form-card h2 { margin-bottom: 16px; font-size: 18px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 14px; }
    input[type="text"], select { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 12px; }
    .editor-wrap { margin-bottom: 12px; }
    .editor-wrap .ql-editor { min-height: 200px; }
    button[type="submit"] { background: #a51312; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button[type="submit"]:hover { background: #8a0f0e; }
    .btn-cancel { background: #6c757d; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-left: 8px; display: none; }
    .btn-cancel:hover { background: #5a6268; }
    .msg { padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; display: none; }
    .msg.ok { display: block; background: #d4edda; color: #155724; }
    .msg.err { display: block; background: #f8d7da; color: #721c24; }
    .filter-bar { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-bar button { padding: 6px 16px; border: 1px solid #a51312; border-radius: 4px; background: #fff; color: #a51312; cursor: pointer; font-size: 13px; }
    .filter-bar button.active { background: #a51312; color: #fff; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
    th { background: #a51312; color: #fff; }
    .btn-edit { background: #0d6efd; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; margin-right: 4px; }
    .btn-edit:hover { background: #0b5ed7; }
    .btn-del { background: #dc3545; color: #fff; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .btn-del:hover { background: #b02a37; }
    .slug-cell { font-family: monospace; font-size: 12px; color: #666; }
  </style>
</head>
<body>

<h1>Страницы</h1>
<nav>
  <a href="/admin/teachers.html">Педагоги</a>
  <a href="/admin/news.html">Новости</a>
  <a href="/admin/collectives.html">Коллективы</a>
  <a href="/admin/applications.html">Заявки</a>
  <a href="/admin/pages.html">Страницы</a>
</nav>

<div class="form-card">
  <h2 id="form-title">Создать страницу</h2>
  <div id="msg" class="msg"></div>
  <form id="form">
    <input type="hidden" id="edit-id">

    <label for="slug">Slug *</label>
    <input id="slug" name="slug" type="text" required placeholder="parents/safety">

    <label for="title">Заголовок *</label>
    <input id="title" name="title" type="text" required placeholder="Безопасность и ответственность">

    <label for="section">Секция</label>
    <select id="section" name="section">
      <option value="">— без секции —</option>
    </select>
    <div style="margin:-8px 0 12px;display:flex;gap:8px;align-items:center;">
      <input id="new-section" type="text" placeholder="Или введите новую секцию (slug)" style="flex:1;margin:0;">
      <button type="button" id="btn-add-section" style="white-space:nowrap;padding:8px 16px;border:1px solid #a51312;background:#fff;color:#a51312;border-radius:4px;cursor:pointer;font-size:13px;">+ Добавить</button>
    </div>

    <label>Содержание *</label>
    <div class="editor-wrap">
      <div id="editor"></div>
    </div>

    <button type="submit" id="btn-submit">Создать</button>
    <button type="button" class="btn-cancel" id="btn-cancel">Отмена</button>
  </form>
</div>

<h2 style="margin-bottom:12px">Список страниц</h2>

<div class="filter-bar" id="filter-bar">
  <button class="active" data-section="">Все</button>
</div>

<table>
  <thead><tr><th>ID</th><th>Slug</th><th>Заголовок</th><th>Секция</th><th>Обновлено</th><th>Действия</th></tr></thead>
  <tbody id="tbody"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script src="/admin/quill-extended.js"></script>
<script>
const API = "http://localhost:3001";
let allPages = [];
let currentFilter = "";
let editingId = null;

const quill = initQuill("#editor", { placeholder: "Содержание страницы..." });

// Filter buttons
document.getElementById("filter-bar").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  currentFilter = e.target.dataset.section;
  document.querySelectorAll("#filter-bar button").forEach(b => b.classList.remove("active"));
  e.target.classList.add("active");
  render();
});

// Add new section button
document.getElementById("btn-add-section").addEventListener("click", () => {
  const input = document.getElementById("new-section");
  const val = input.value.trim();
  if (!val) return;
  const select = document.getElementById("section");
  // Check if already exists
  if (Array.from(select.options).some(o => o.value === val)) {
    select.value = val;
    input.value = "";
    return;
  }
  const opt = document.createElement("option");
  opt.value = val;
  opt.textContent = val;
  select.appendChild(opt);
  select.value = val;
  input.value = "";
  // Also add filter button
  addFilterButton(val);
});

function addFilterButton(section) {
  const bar = document.getElementById("filter-bar");
  if (bar.querySelector(`[data-section="${section}"]`)) return;
  const btn = document.createElement("button");
  btn.dataset.section = section;
  btn.textContent = section;
  bar.appendChild(btn);
}

function rebuildSections() {
  const sections = [...new Set(allPages.map(p => p.section).filter(Boolean))];
  const select = document.getElementById("section");
  const current = select.value;
  select.innerHTML = '<option value="">— без секции —</option>';
  sections.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    select.appendChild(opt);
    addFilterButton(s);
  });
  if (current) select.value = current;
}

async function load() {
  const res = await fetch(API + "/api/pages");
  allPages = await res.json();
  rebuildSections();
  render();
}

function render() {
  const filtered = currentFilter ? allPages.filter(p => p.section === currentFilter) : allPages;
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = filtered.map(p => `
    <tr>
      <td>${p.id}</td>
      <td class="slug-cell">${esc(p.slug)}</td>
      <td>${esc(p.title)}</td>
      <td>${esc(p.section || "—")}</td>
      <td>${p.updated_at || ""}</td>
      <td>
        <button class="btn-edit" onclick="edit(${p.id})">Редактировать</button>
        <button class="btn-del" onclick="del(${p.id})">Удалить</button>
      </td>
    </tr>
  `).join("");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

async function edit(id) {
  const res = await fetch(API + "/api/pages");
  const pages = await res.json();
  const page = pages.find(p => p.id === id);
  if (!page) return;

  // Fetch full content
  const fullRes = await fetch(API + "/api/pages/" + page.slug);
  const full = await fullRes.json();

  editingId = id;
  document.getElementById("edit-id").value = id;
  document.getElementById("slug").value = full.slug;
  document.getElementById("slug").disabled = true;
  document.getElementById("title").value = full.title;
  document.getElementById("section").value = full.section || "";
  quill._setContent(full.content);

  document.getElementById("form-title").textContent = "Редактировать страницу #" + id;
  document.getElementById("btn-submit").textContent = "Сохранить";
  document.getElementById("btn-cancel").style.display = "inline-block";

  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("btn-cancel").addEventListener("click", resetForm);

function resetForm() {
  editingId = null;
  document.getElementById("edit-id").value = "";
  document.getElementById("form").reset();
  document.getElementById("slug").disabled = false;
  quill._reset();
  document.getElementById("form-title").textContent = "Создать страницу";
  document.getElementById("btn-submit").textContent = "Создать";
  document.getElementById("btn-cancel").style.display = "none";
  document.getElementById("msg").className = "msg";
}

async function del(id) {
  if (!confirm("Удалить страницу?")) return;
  await fetch(API + "/api/admin/pages/" + id, { method: "DELETE" });
  load();
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const msg = document.getElementById("msg");
  const content = quill._getContent();
  if (!content || content === "<p><br></p>") {
    msg.className = "msg err";
    msg.textContent = "Содержание обязательно";
    return;
  }

  const body = {
    title: document.getElementById("title").value.trim(),
    content,
    section: document.getElementById("section").value || null,
  };

  try {
    let res;
    if (editingId) {
      res = await fetch(API + "/api/admin/pages/" + editingId, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
    } else {
      body.slug = document.getElementById("slug").value.trim();
      res = await fetch(API + "/api/admin/pages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
    }
    if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
    msg.className = "msg ok";
    msg.textContent = editingId ? "Страница обновлена!" : "Страница создана!";
    resetForm();
    load();
  } catch (err) {
    msg.className = "msg err";
    msg.textContent = "Ошибка: " + err.message;
  }
});

load();
</script>

</body>
</html>
