<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Педагог — Песнохорки</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Montserrat Alternates", sans-serif; background: #fffff9; color: #333; }

    .hero { background: #a51312; color: #fff; padding: 40px 20px 32px; }
    .hero-inner { max-width: 1000px; margin: 0 auto; }
    .breadcrumbs { font-size: 13px; opacity: .8; margin-bottom: 16px; }
    .breadcrumbs a { color: #fff; text-decoration: none; }
    .breadcrumbs span { margin: 0 6px; }

    .container { max-width: 1000px; margin: 0 auto; padding: 32px 20px; }

    .profile { display: flex; gap: 32px; align-items: flex-start; }
    .photo { width: 280px; min-width: 280px; height: 360px; object-fit: cover; border-radius: 12px; background: #eee; }
    .info { flex: 1; }
    .name { font-size: 28px; font-weight: 700; color: #a51312; margin-bottom: 16px; }
    .bio { font-size: 15px; line-height: 1.7; white-space: pre-line; }
    .created { font-size: 13px; color: #999; margin-top: 16px; }
    .back { display: inline-block; margin-top: 24px; color: #a51312; font-weight: 600; text-decoration: none; }
    .back:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 60px 20px; font-size: 16px; color: #888; }

    @media (max-width: 768px) {
      .profile { flex-direction: column; }
      .photo { width: 100%; height: 280px; }
      .name { font-size: 22px; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-inner">
    <div class="breadcrumbs">
      <a href="/">Главная</a><span>/</span>
      <a href="/pages/teachers.html">Педагоги</a><span>/</span>
      <span id="bc-name">...</span>
    </div>
  </div>
</section>

<div class="container">
  <div id="content"></div>
</div>

<script>
const API = "http://localhost:3001";
const id = new URLSearchParams(location.search).get("id");

async function load() {
  if (!id) { show404(); return; }
  try {
    const res = await fetch(API + "/api/teachers/" + id);
    if (!res.ok) { show404(); return; }
    const t = await res.json();

    document.title = t.name + " — Песнохорки";
    document.getElementById("bc-name").textContent = t.name;

    document.getElementById("content").innerHTML = `
      <div class="profile">
        <img class="photo" src="${t.photo_url || 'https://via.placeholder.com/400x500?text=Фото'}" alt="${esc(t.name)}" onerror="this.src='https://via.placeholder.com/400x500?text=Фото'">
        <div class="info">
          <h1 class="name">${esc(t.name)}</h1>
          <div class="bio">${esc(t.bio)}</div>
          <div class="created">Добавлен: ${t.created_at || ""}</div>
          <a class="back" href="/pages/teachers.html">&larr; Все педагоги</a>
        </div>
      </div>
    `;
  } catch (err) {
    document.getElementById("content").innerHTML = `<div class="empty">Ошибка: ${err.message}</div>`;
  }
}

function show404() {
  document.getElementById("content").innerHTML = `<div class="empty">Педагог не найден</div>`;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

load();
</script>

</body>
</html>
