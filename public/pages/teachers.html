<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Педагогический состав — Песнохорки</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Montserrat Alternates", sans-serif; background: #fffff9; color: #333; }

    .hero { background: #a51312; color: #fff; padding: 40px 20px 32px; }
    .hero-inner { max-width: 1000px; margin: 0 auto; }
    .breadcrumbs { font-size: 13px; opacity: .8; margin-bottom: 16px; }
    .breadcrumbs a { color: #fff; text-decoration: none; }
    .breadcrumbs span { margin: 0 6px; }
    .hero h1 { font-size: 32px; font-weight: 700; }

    .container { max-width: 1000px; margin: 0 auto; padding: 32px 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }

    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s; text-decoration: none; color: inherit; display: block; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
    .card-img { width: 100%; height: 240px; object-fit: cover; background: #eee; }
    .card-body { padding: 16px 20px; }
    .card-name { font-size: 17px; font-weight: 600; color: #a51312; }

    .empty { text-align: center; padding: 60px 20px; font-size: 16px; color: #888; }

    @media (max-width: 768px) {
      .hero h1 { font-size: 24px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-inner">
    <div class="breadcrumbs">
      <a href="/">Главная</a><span>/</span>Педагогический состав
    </div>
    <h1>Педагогический состав</h1>
  </div>
</section>

<div class="container">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Педагоги ещё не добавлены</div>
</div>

<script>
const API = "http://localhost:3001";

async function load() {
  try {
    const res = await fetch(API + "/api/teachers");
    const data = await res.json();
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");

    if (!data.length) { empty.style.display = "block"; return; }

    grid.innerHTML = data.map(t => `
      <a class="card" href="/pages/teacher.html?id=${t.id}">
        <img class="card-img" src="${t.photo_url || 'https://via.placeholder.com/400x300?text=Фото'}" alt="${esc(t.name)}" onerror="this.src='https://via.placeholder.com/400x300?text=Фото'">
        <div class="card-body">
          <div class="card-name">${esc(t.name)}</div>
        </div>
      </a>
    `).join("");
  } catch (err) {
    document.getElementById("empty").style.display = "block";
    document.getElementById("empty").textContent = "Ошибка загрузки: " + err.message;
  }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

load();
</script>

</body>
</html>
