<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новости — Песнохорки</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Montserrat Alternates", sans-serif; background: #fffff9; color: #333; }

    .hero { background: #a51312; color: #fff; padding: 40px 20px 32px; }
    .hero-inner { max-width: 1000px; margin: 0 auto; }
    .breadcrumbs { font-size: 13px; opacity: .8; margin-bottom: 16px; }
    .breadcrumbs a { color: #fff; text-decoration: none; }
    .breadcrumbs span { margin: 0 6px; }
    .hero h1 { font-size: 32px; font-weight: 700; }

    .container { max-width: 1000px; margin: 0 auto; padding: 32px 20px; }
    .list { display: flex; flex-direction: column; gap: 20px; }

    .card { display: flex; gap: 20px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s; text-decoration: none; color: inherit; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
    .card-img { width: 200px; min-width: 200px; height: 160px; object-fit: cover; background: #eee; }
    .card-body { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; }
    .card-date { font-size: 13px; color: #a51312; font-weight: 600; margin-bottom: 6px; }
    .card-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .card-preview { font-size: 14px; color: #666; line-height: 1.5; }

    .empty { text-align: center; padding: 60px 20px; font-size: 16px; color: #888; }

    @media (max-width: 768px) {
      .hero h1 { font-size: 24px; }
      .card { flex-direction: column; }
      .card-img { width: 100%; height: 200px; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-inner">
    <div class="breadcrumbs">
      <a href="/">Главная</a><span>/</span>Новости
    </div>
    <h1>Новости</h1>
  </div>
</section>

<div class="container">
  <div class="list" id="list"></div>
  <div class="empty" id="empty" style="display:none">Новостей пока нет</div>
</div>

<script>
const API = "http://localhost:3001";

async function load() {
  try {
    const res = await fetch(API + "/api/news");
    const data = await res.json();
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");

    if (!data.length) { empty.style.display = "block"; return; }

    list.innerHTML = data.map(n => `
      <a class="card" href="/pages/news-detail.html?id=${n.id}">
        ${n.image_url ? `<img class="card-img" src="${esc(n.image_url)}" alt="" onerror="this.style.display='none'">` : ""}
        <div class="card-body">
          <div class="card-date">${esc(n.date)}</div>
          <div class="card-title">${esc(n.title)}</div>
          <div class="card-preview">${esc(n.preview || "")}${(n.preview || "").length >= 200 ? "..." : ""}</div>
        </div>
      </a>
    `).join("");
  } catch (err) {
    document.getElementById("empty").style.display = "block";
    document.getElementById("empty").textContent = "Ошибка загрузки: " + err.message;
  }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

load();
</script>

</body>
</html>
