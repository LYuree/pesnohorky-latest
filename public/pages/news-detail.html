<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новость — Песнохорки</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Montserrat Alternates", sans-serif; background: #fffff9; color: #333; }

    .hero { background: #a51312; color: #fff; padding: 40px 20px 32px; }
    .hero-inner { max-width: 1000px; margin: 0 auto; }
    .breadcrumbs { font-size: 13px; opacity: .8; margin-bottom: 16px; }
    .breadcrumbs a { color: #fff; text-decoration: none; }
    .breadcrumbs span { margin: 0 6px; }

    .container { max-width: 800px; margin: 0 auto; padding: 32px 20px; }

    .article-date { font-size: 14px; color: #a51312; font-weight: 600; margin-bottom: 8px; }
    .article-title { font-size: 28px; font-weight: 700; margin-bottom: 20px; color: #a51312; }
    .article-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 24px; }
    .article-content { font-size: 16px; line-height: 1.8; white-space: pre-line; }
    .back { display: inline-block; margin-top: 32px; color: #a51312; font-weight: 600; text-decoration: none; }
    .back:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 60px 20px; font-size: 16px; color: #888; }

    @media (max-width: 768px) {
      .article-title { font-size: 22px; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-inner">
    <div class="breadcrumbs">
      <a href="/">Главная</a><span>/</span>
      <a href="/pages/news.html">Новости</a><span>/</span>
      <span id="bc-title">...</span>
    </div>
  </div>
</section>

<div class="container">
  <div id="content"></div>
</div>

<script>
const API = "http://localhost:3001";
const id = new URLSearchParams(location.search).get("id");

async function load() {
  if (!id) { show404(); return; }
  try {
    const res = await fetch(API + "/api/news/" + id);
    if (!res.ok) { show404(); return; }
    const n = await res.json();

    document.title = n.title + " — Песнохорки";
    document.getElementById("bc-title").textContent = n.title;

    document.getElementById("content").innerHTML = `
      <div class="article-date">${esc(n.date)}</div>
      <h1 class="article-title">${esc(n.title)}</h1>
      ${n.image_url ? `<img class="article-img" src="${esc(n.image_url)}" alt="" onerror="this.style.display='none'">` : ""}
      <div class="article-content">${esc(n.content)}</div>
      <a class="back" href="/pages/news.html">&larr; Все новости</a>
    `;
  } catch (err) {
    document.getElementById("content").innerHTML = `<div class="empty">Ошибка: ${err.message}</div>`;
  }
}

function show404() {
  document.getElementById("content").innerHTML = `<div class="empty">Новость не найдена</div>`;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

load();
</script>

</body>
</html>
